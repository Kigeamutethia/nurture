<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Nurture Consultancy Limited | Data, AI, ERP & Cloud Solutions in Kenya</title>
    <meta name="description" content="Leading provider of Data Engineering, Data Analysis, Artificial Intelligence, Machine Learning, ERP solutions including Microsoft Dynamics 365 Business Central, and Cloud solutions in Kenya, delivering intelligent, scalable, and secure technology platforms that enable organizations to optimize operations, unlock insights, and accelerate digital transformation." />
    <meta name="keywords" content="Data Engineering Kenya, Machine Learning, Data Analysis, AI Kenya, ERP Kenya, Machine Learning Kenya, Cloud Solutions Kenya, Software Development Kenya, Analytics Kenya" />
    <meta name="author" content="Nurture Consultancy Limited" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.nurture.co.ke/" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />

    <!-- Mobile Theme -->
    <meta name="theme-color" content="#36ac43">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Open Graph (LinkedIn, Facebook, WhatsApp) -->
    <meta property="og:title" content="Nurture Consultancy Limited | Data, AI & ERP Solutions" />
    <meta property="og:description" content="Leading provider of Data Engineering, AI, ERP, and Cloud solutions in Kenya." />
    <meta property="og:image" content="https://www.nurture.co.ke/preview.png" />
    <meta property="og:url" content="https://www.nurture.co.ke/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nurture Consultancy Limited" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nurture Consultancy Limited" />
    <meta name="twitter:description" content="Data Engineering, AI, ERP, and Cloud Solutions in Kenya." />
    <meta name="twitter:image" content="https://www.nurture.co.ke/preview.png" />

    <!-- Structured Data (Google SEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Nurture Consultancy Limited",
      "url": "https://www.nurture.co.ke",
      "logo": "https://www.nurture.co.ke/logo.png",
      "description": "Nurture Consultancy Limited provides Data Engineering, Artificial Intelligence, ERP, and Cloud Solutions.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "KE"
      },
      "sameAs": [
        "https://www.linkedin.com/company/nurture-consultancy-limited/"
      ]
    }
    </script>

  </head>

  <body>
    <!-- React root -->
    <div id="root"></div>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.jsx"></script>
